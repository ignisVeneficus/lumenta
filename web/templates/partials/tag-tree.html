<ul class="tag-tree tree">
  {{- range . -}}
    <li class="tag-node tree-node">
      {{- if .Children -}}
        <input type="checkbox" id="toggle-{{ .ID }}" class="tag-toggle tree-toggle" checked>
        <label for="toggle-{{ .ID }}" class="tag-label tree-label" >
          <i class="fa-solid fa-chevron-right tag-icon tree-icon icon" title="{{ t "nav.tree.toggle"}}"></i>
          <a href="{{ tagPath .ID }}" class="tag-link tree-link" >{{ .Name }}</a>
        </label>
        {{ template "partials/tag-tree.html" .Children }}
      {{- else -}}
        <span class="tag-leaf tree-leaf">
          <a href="{{ tagPath .ID }}" class="tag-link tree-link">{{ .Name }}</a>
        </span>
      {{- end -}}
    </li>
  {{- end -}}
</ul>
