<fieldset class="acl-group radio-group">
  <label class="acl-item radio-item">
    <div class="radio-row">
      <input type="radio" name="acl_level" value="0"
      {{ if eq .ACLLevel "0" }}checked{{ end }}
      >
      <i class="fa-solid fa-globe"></i>
      <span>Public</span>
    </div>
  </label>
  <label class="acl-item acl-user radio-item">
    <div class="radio-row">
      <input type="radio" name="acl_level" value="1"
      {{ if eq .ACLLevel "1" }}checked{{ end }}
      >
      <i class="fa-solid fa-user"></i>
      <span>User</span>
    </div>
    <!-- TODO replace dynamic select-->
    <select name="acl_user" class="acl-select radio-option">
    </select>
  </label>

  <label class="acl-item radio-item">
    <div class="radio-row">
      <input type="radio" name="acl_level" value="2"
      {{ if eq .ACLLevel "2" }}checked{{ end }}
      >
      <i class="fa-solid fa-lock"></i>
      <span>Admin Only</span>
    </div>
  </label>

</fieldset>
