<div class="card-grid-wrapper">
    <div class="card-grid">
        {{- range $card:= .Cards -}}
        <a class="card" href="{{$card.URL}}">
            <div class="media">
                {{- if  $card.Image -}}
                <img
                    class="derivative-img"
                    src="{{ imagePath $card.Image "w640" }}"
                    loading="lazy"
                    decoding="async"
                >
                {{- else -}}
                <div class="no-image">
                    {{ template "icon" (i "page.public.common.cover_placeholder" "")}}
                </div>
                {{- end -}}
            </div>
            <div class="meta">
                <div class="name">{{$card.Name}}</div>
                <div class="description" data="{{$card.Description}}">{{$card.Description}}</div>
                <div class="info">{{$card.Info}}</div>
            </div>
        </a>
        {{- end -}}
    </div>
    {{- template "partials/paging.html" .Paging -}}
</div>
