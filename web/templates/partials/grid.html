{{- if .Images -}}
<div class="imageGrid">
    {{- range .Images -}}
        <figure class="tile {{ gridTileRole . }}" {{ gridRectToVar . }}>
            <a href="{{ .URL }}" title="{{ .Title }}">
                <img
                    src="{{ imagePath .ImgId "w1024" }}"
                    alt="{{ .Title }}"
                    loading="lazy"
                    decoding="async"
                    class="derivative-img"
                >
                <figcaption class="caption">{{ .Title }}</figcaption>
            </a>
        </figure>
    {{- end -}}
</div>
{{- end -}}
