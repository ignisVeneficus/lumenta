{{- if .ImageTags -}}
<div class="ctx-menu-block">
  <details class="image-tag-panel context-panel">
    <summary class="image-tag-trigger context-trigger action button">
      {{ template "icon" (i "action.ctx.tags" (t "action.ctx.tags.label"))}}
    </summary>
    <div class="tag-content context-content tree-wrapper">
      {{- template "partials/tag-forest.html" .ImageTags.Roots }}
    </div>
  </details>
</div>
{{- end -}}
