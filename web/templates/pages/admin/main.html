{{ define "main" }}
<div class="content admin-main">
    {{ range .Cards }}
    <div class="card">
        <a href="{{ .URL }}">
            {{template "icon" (i .IconKey .IconTitle)}}
        <div class="label">{{ .Title }}</div>
        <div class="stats">
            {{ range .Stats }}
            <div>{{ .Label }}: {{ .Value }}</div>
            {{ end }}
        </div>
        </a>
    </div>
    {{ end }}

</div>
{{ end }}
